# ============================================================
# SEED Educa — Configuração do Nginx
# ============================================================
# O Nginx é um "porteiro" do sistema. Todo mundo que acessa
# o sistema passa por ele primeiro. Ele decide para onde
# mandar cada requisição.
# ============================================================

# Define quantos processos o Nginx usa (auto = um por CPU)
worker_processes auto;

events {
    # Máximo de conexões simultâneas por processo
    worker_connections 1024;
}

http {

    # Tipos de arquivo que o Nginx reconhece (HTML, CSS, JS, etc.)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------
    # FORMATO DOS LOGS
    # Registra cada requisição: IP, hora, URL, status, tempo
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --------------------------------------------------------
    # PERFORMANCE
    # sendfile: envia arquivos direto do disco sem copiar
    # keepalive: mantém conexão aberta para várias requisições
    # --------------------------------------------------------
    sendfile        on;
    keepalive_timeout 65;

    # --------------------------------------------------------
    # COMPRESSÃO GZIP
    # Comprime as respostas antes de enviar ao navegador.
    # Reduz até 70% do tamanho das respostas JSON e HTML.
    # --------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # --------------------------------------------------------
    # UPSTREAM — onde ficam os microsserviços
    # O Nginx conhece o endereço interno de cada MS.
    # Os nomes (ms-autenticacao, ms-questoes...) são os
    # nomes dos containers no docker-compose.yml
    # --------------------------------------------------------
    upstream ms_autenticacao {
        server ms-autenticacao:8081;
    }

    upstream ms_questoes {
        server ms-questoes:8082;
    }

    upstream ms_simulados {
        server ms-simulados:8083;
    }

    upstream ms_cursos {
        server ms-cursos:8084;
    }

    upstream ms_relatorios {
        server ms-relatorios:8085;
    }

    upstream api_gateway {
        server api-gateway:8080;
    }

    # --------------------------------------------------------
    # SERVIDOR PRINCIPAL
    # Escuta na porta 80 (HTTP padrão)
    # --------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Tamanho máximo de upload (imagens de questões, CSVs)
        client_max_body_size 10M;

        # ----------------------------------------------------
        # FRONTEND — React SPA
        # Serve os arquivos estáticos do React.
        # O "try_files" garante que rotas do React (ex: /aluno/dashboard)
        # funcionem mesmo após recarregar a página.
        # ----------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ----------------------------------------------------
        # API GATEWAY — porta de entrada de toda a API
        # Qualquer URL que começa com /api/ vai para o gateway,
        # que decide qual microsserviço deve responder.
        # ----------------------------------------------------
        location /api/ {
            proxy_pass http://api_gateway/;

            # Passa informações reais do cliente para o backend
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Tempo máximo de espera por resposta do backend
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ----------------------------------------------------
        # ROTA PÚBLICA — verificação de certificados QR Code
        # Não precisa de autenticação. Qualquer pessoa pode
        # verificar se um certificado é válido.
        # ----------------------------------------------------
        location /verificar-certificado/ {
            proxy_pass http://api_gateway/verificar-certificado/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
        }

        # ----------------------------------------------------
        # HEALTH CHECK — verifica se o Nginx está vivo
        # Usado pelo Docker e pelo CI/CD para monitoramento
        # ----------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ----------------------------------------------------
        # SEGURANÇA — headers padrão de proteção
        # ----------------------------------------------------
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # ----------------------------------------------------
        # PÁGINAS DE ERRO PERSONALIZADAS
        # ----------------------------------------------------
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
