services:

  #
  # BANCO DE DADOS
  #
  postgres:
    image: postgres:16
    container_name: seed-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seed-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  #
  # CACHE E SESSÕES DE SIMULADO
  #
  redis:
    image: redis:7-alpine
    container_name: seed-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seed-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  #
  # ARMAZENAMENTO DE ARQUIVOS
  # (Certificados PDF e imagens de questões)
  #
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: seed-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - seed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

#
# VOLUMES PERSISTENTES
#
volumes:
  postgres_data:
  redis_data:
  minio_data:

#
# REDE INTERNA
#
networks:
  seed-network:
    driver: bridge
