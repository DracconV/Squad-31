# ============================================================
# SEED Educa — Pipeline de CI (Integração Contínua)
# ============================================================
# Este arquivo diz ao GitHub o que fazer automaticamente
# toda vez que alguém fizer push ou abrir um Pull Request.
#
# CI = Continuous Integration = Integração Contínua
# Na prática: "roda os testes antes de aceitar o código"
# ============================================================

# Nome que aparece na aba "Actions" do GitHub
name: CI — SEED Educa

# ============================================================
# GATILHO — quando este pipeline é executado
# ============================================================
on:
  # Quando alguém fizer push em qualquer branch
  push:
    branches:
      - main
      - develop
      - 'feature/**'   # ex: feature/ms-autenticacao

  # Quando alguém abrir ou atualizar um Pull Request
  pull_request:
    branches:
      - main
      - develop

# ============================================================
# JOBS — as tarefas que serão executadas
# Cada job roda em uma máquina virtual limpa no GitHub
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1: Verificar o Backend (Java/Spring Boot)
  # ----------------------------------------------------------
  build-backend:
    name: Build e Testes — Backend
    runs-on: ubuntu-latest   # Máquina virtual Linux gratuita

    # Serviços que sobem junto com o job (como o docker-compose, mas no CI)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: seed_educa_test
          POSTGRES_USER: seed_user
          POSTGRES_PASSWORD: seed_pass
        ports:
          - 5432:5432
        # Espera o banco ficar pronto antes de rodar os testes
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Estratégia de matrix: roda o mesmo job para cada microsserviço
    strategy:
      matrix:
        microservico:
          - ms-autenticacao
          - ms-questoes
          - ms-simulados
          - ms-cursos
          - ms-relatorios
          - api-gateway
      # Se um falhar, continua testando os outros
      fail-fast: false

    steps:
      # Passo 1: Baixa o código do repositório na máquina virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Instala o Java 21 (versão LTS usada no projeto)
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'   # OpenJDK da Eclipse Foundation (gratuito)

      # Passo 3: Cache do Maven
      # Salva as dependências baixadas para não baixar de novo na próxima vez
      # Economiza ~2 minutos por execução
      - name: Cache de dependências Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Passo 4: Verifica se a pasta do microsserviço existe
      # (evita erro se o MS ainda não foi criado)
      - name: Verificar se microsserviço existe
        id: check
        run: |
          if [ -f "backend/${{ matrix.microservico }}/pom.xml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  backend/${{ matrix.microservico }} ainda não tem pom.xml — pulando."
          fi

      # Passo 5: Compila e roda os testes
      - name: Build e Testes — ${{ matrix.microservico }}
        if: steps.check.outputs.exists == 'true'
        working-directory: backend/${{ matrix.microservico }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/seed_educa_test
          SPRING_DATASOURCE_USERNAME: seed_user
          SPRING_DATASOURCE_PASSWORD: seed_pass
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
        # mvn verify = compila + roda testes unitários + testes de integração
        run: mvn verify --no-transfer-progress

      # Passo 6: Publica o relatório de testes no GitHub
      - name: Publicar relatório de testes
        if: steps.check.outputs.exists == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.microservico }}
          path: backend/${{ matrix.microservico }}/target/surefire-reports/
          retention-days: 7   # Guarda por 7 dias

  # ----------------------------------------------------------
  # JOB 2: Verificar o Frontend (React + TypeScript)
  # ----------------------------------------------------------
  build-frontend:
    name: Build e Testes — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o Node.js (runtime do React)
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Verifica se o frontend já foi iniciado
      - name: Verificar se frontend existe
        id: check-fe
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  frontend/package.json ainda não existe — pulando."
          fi

      # Instala as dependências (node_modules)
      - name: Instalar dependências
        if: steps.check-fe.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci   # ci = install limpo, mais rápido que npm install

      # Verifica erros de TypeScript e ESLint
      - name: Lint e verificação de tipos
        if: steps.check-fe.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm run lint     || echo "lint ainda não configurado"
          npm run type-check || echo "type-check ainda não configurado"

      # Gera o build de produção
      - name: Build de produção
        if: steps.check-fe.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build

  # ----------------------------------------------------------
  # JOB 3: Validar o Docker Compose
  # Garante que o arquivo de infraestrutura está correto
  # ----------------------------------------------------------
  validate-infra:
    name: Validar Infraestrutura (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar docker-compose.yml
        working-directory: infra
        run: docker compose config --quiet
        # --quiet = só mostra erros, não imprime o arquivo inteiro

  # ----------------------------------------------------------
  # JOB 4: Notificação de Status (resumo final)
  # Roda só depois que todos os outros jobs terminarem
  # ----------------------------------------------------------
  status:
    name: Status do Pipeline
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, validate-infra]
    # always() = roda mesmo se algum job anterior falhou
    if: always()

    steps:
      - name: Resumo do Pipeline
        run: |
          echo "============================================"
          echo "  SEED Educa — Resultado do CI"
          echo "============================================"
          echo "  Backend:  ${{ needs.build-backend.result }}"
          echo "  Frontend: ${{ needs.build-frontend.result }}"
          echo "  Infra:    ${{ needs.validate-infra.result }}"
          echo "============================================"
