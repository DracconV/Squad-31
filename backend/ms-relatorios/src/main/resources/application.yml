spring:
  application:
    name: ms-relatorios

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seed_educa}
    username: ${DB_USER:seed_user}
    password: ${DB_PASSWORD:seed_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Histórico próprio: o ms-autenticacao é dono do flyway_schema_history padrão
    # (banco compartilhado). Sem isto, o V1 deste serviço colide com o V1 daquele.
    table: flyway_schema_history_relatorios
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: ms-relatorios
      auto-offset-reset: earliest
    listener:
      ack-mode: manual_immediate

server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET:seed-educa-jwt-secret-key-2024-muito-segura-para-desenvolvimento}
  expiration: 86400000

logging:
  level:
    br.gov.seed: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO

