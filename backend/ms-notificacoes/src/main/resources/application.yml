spring:
  application:
    name: ms-notificacoes

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seed_educa}
    username: ${DB_USER:seed_user}
    password: ${DB_PASSWORD:seed_pass}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Histórico próprio: o ms-autenticacao é dono do flyway_schema_history padrão
    # (banco compartilhado). Sem isto, o V1 deste serviço colide com o V1 daquele
    # e o serviço entra em crash-loop (derrubando o gateway, que depende dele).
    table: flyway_schema_history_notificacoes
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: ms-notificacoes
      # latest: notifica apenas eventos novos — não reprocessa conclusões antigas no 1º start
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8091}

jwt:
  secret: ${JWT_SECRET:chave-secreta-para-desenvolvimento-local-seed}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    br.com.seed.notificacoes: DEBUG
