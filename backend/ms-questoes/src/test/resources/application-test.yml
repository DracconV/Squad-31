spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Swagger não é necessário em testes
  mvc:
    pathmatch:
      use-suffix-pattern: false

jwt:
  secret: test-secret-key-para-testes-unitarios-12345

enem:
  api:
    base-url: http://api-mock-nao-existe
    auto-import: false

logging:
  level:
    br.gov.seed: WARN
    org.springframework: WARN
