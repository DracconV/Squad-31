spring:
  application:
    name: ms-questoes

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seed_educa}
    username: ${DB_USER:seed_user}
    password: ${DB_PASSWORD:seed_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET:seed-educa-jwt-secret-key-2024-muito-segura-para-desenvolvimento}

enem:
  api:
    base-url: https://api.enem.dev/v1
    auto-import: ${ENEM_AUTO_IMPORT:true}

logging:
  level:
    br.gov.seed: DEBUG
