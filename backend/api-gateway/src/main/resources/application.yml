spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - PreserveHostHeader
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@remoteAddressKeyResolver}"
          routes:
            - id: ms-autenticacao-auth
              uri: ${MS_AUTENTICACAO_URL:http://localhost:8081}
              predicates:
                - Path=/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@remoteAddressKeyResolver}"

            - id: ms-autenticacao-admin
              uri: ${MS_AUTENTICACAO_URL:http://localhost:8081}
              predicates:
                - Path=/admin/**

            - id: ms-autenticacao-turmas
              uri: ${MS_AUTENTICACAO_URL:http://localhost:8081}
              predicates:
                - Path=/turmas/**

            - id: ms-autenticacao-agendamentos
              uri: ${MS_AUTENTICACAO_URL:http://localhost:8081}
              predicates:
                - Path=/agendamentos/**

            - id: ms-cursos
              uri: ${MS_CURSOS_URL:http://localhost:8085}
              predicates:
                - Path=/cursos/**,/inscricoes/**,/stats/**,/modulos/**

            - id: ms-certificados
              uri: ${MS_CERTIFICADOS_URL:http://localhost:8086}
              predicates:
                - Path=/certificados/**,/verificar-certificado/**

            - id: ms-questoes
              uri: ${MS_QUESTOES_URL:http://localhost:8087}
              predicates:
                - Path=/questoes/**,/disciplinas/**,/assuntos/**

            - id: ms-simulados
              uri: ${MS_SIMULADOS_URL:http://localhost:8088}
              predicates:
                - Path=/simulados/**

            - id: ms-relatorios
              uri: ${MS_RELATORIOS_URL:http://localhost:8089}
              predicates:
                - Path=/relatorios/**,/diagnostico/**,/desempenho/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    br.gov.seed: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO