worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream ms_autenticacao { server ms-autenticacao:8081; }
    upstream ms_questoes     { server ms-questoes:8082; }
    upstream ms_simulados    { server ms-simulados:8083; }
    upstream ms_relatorios   { server ms-relatorios:8084; }
    upstream ms_certificados { server ms-certificados:8085; }
    upstream ms_cursos       { server ms-cursos:8086; }
    upstream analytics_ia    { server analytics-ia:8087; }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10M;

        # Frontend React
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API — todas as chamadas passam pelo gateway
        location /api/ {
            proxy_pass http://api_gateway/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Verificação pública de certificados — sem autenticação
        location /verificar-certificado/ {
            proxy_pass http://api_gateway/verificar-certificado/;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check do Nginx
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
